name: redis-multi-instance
description: |
  Two independent Redis instances in the same namespace. Validates that
  the wire protocol proxy, K8s Service routing, health checks, and
  test-agent connection management all work correctly when multiple
  Redis databases coexist. Each instance has its own keyspace.
config:
  timeoutSeconds: 120
items:
  - type: DATABASE
    name: cache-db
    database: redis
  - type: DATABASE
    name: session-db
    database: redis
tests:
  - name: Each instance has an independent keyspace
    steps:
      - - name: SET a key in cache-db
          action:
            type: dbQuery
            database: cache-db
            query: SET shared-key cache-value
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
        - name: SET the same key in session-db with a different value
          action:
            type: dbQuery
            database: session-db
            query: SET shared-key session-value
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
      - - name: cache-db returns its own value
          action:
            type: dbQuery
            database: cache-db
            query: GET shared-key
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].value
                  operator: eq
                  value: cache-value
        - name: session-db returns its own value
          action:
            type: dbQuery
            database: session-db
            query: GET shared-key
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].value
                  operator: eq
                  value: session-value

  - name: Key in one instance does not exist in the other
    steps:
      - - name: SET a key only in cache-db
          action:
            type: dbQuery
            database: cache-db
            query: SET cache-only-key exclusive
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
      - - name: GET from session-db returns empty
          action:
            type: dbQuery
            database: session-db
            query: GET cache-only-key
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data
                  operator: length
                  value: 0

  - name: Parallel writes to both instances
    steps:
      - - name: Write to cache-db
          action:
            type: dbQuery
            database: cache-db
            query: SET par-key alpha
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
        - name: Write to session-db
          action:
            type: dbQuery
            database: session-db
            query: SET par-key beta
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true

  - name: Read back from both instances after writes
    steps:
      - - name: Verify cache-db value
          action:
            type: dbQuery
            database: cache-db
            query: GET par-key
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].value
                  operator: eq
                  value: alpha
        - name: Verify session-db value
          action:
            type: dbQuery
            database: session-db
            query: GET par-key
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].value
                  operator: eq
                  value: beta

  - name: Different data structures per instance
    steps:
      - - name: HSET a hash in cache-db
          action:
            type: dbQuery
            database: cache-db
            query: HSET user:1 name Alice role admin
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
        - name: LPUSH a list in session-db
          action:
            type: dbQuery
            database: session-db
            query: LPUSH recent-sessions sess-c sess-b sess-a
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
      - - name: HGETALL from cache-db
          action:
            type: dbQuery
            database: cache-db
            query: HGETALL user:1
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].name
                  operator: eq
                  value: Alice
                - path: data[0].role
                  operator: eq
                  value: admin
        - name: LRANGE from session-db
          action:
            type: dbQuery
            database: session-db
            query: LRANGE recent-sessions 0 -1
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data
                  operator: length
                  value: 3
                - path: data[0].value
                  operator: eq
                  value: sess-a
                - path: data[1].value
                  operator: eq
                  value: sess-b
                - path: data[2].value
                  operator: eq
                  value: sess-c

  - name: DEL in one instance does not affect the other
    steps:
      - - name: SET same key in both
          action:
            type: dbQuery
            database: cache-db
            query: SET del-test present
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
        - name: SET same key in session-db
          action:
            type: dbQuery
            database: session-db
            query: SET del-test present
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
      - - name: DEL from cache-db only
          action:
            type: dbQuery
            database: cache-db
            query: DEL del-test
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].value
                  operator: eq
                  value: 1
      - - name: Confirm deleted from cache-db
          action:
            type: dbQuery
            database: cache-db
            query: GET del-test
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data
                  operator: length
                  value: 0
        - name: Confirm still present in session-db
          action:
            type: dbQuery
            database: session-db
            query: GET del-test
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].value
                  operator: eq
                  value: present
