name: Dokkimi Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t ghcr.io/dokkimi/traffic-tester:latest .

      - name: Run Dokkimi tests
        uses: dokkimi/github-action@v1.0.1
        with:
          tests: .dokkimi
          max-parallel: 3
          max-booting: 1

      - name: Extract version from package.json
        if: success() && github.ref == 'refs/heads/main'
        id: version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: success() && github.ref == 'refs/heads/main'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: success() && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: success() && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: success() && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/dokkimi/traffic-tester:latest
            ghcr.io/dokkimi/traffic-tester:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=ghcr.io/dokkimi/traffic-tester:buildcache
          cache-to: type=registry,ref=ghcr.io/dokkimi/traffic-tester:buildcache,mode=max
